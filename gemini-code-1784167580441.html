<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Craft Calculator</title>
  <style>
    /* Зеленая тема */
    :root {
      --bg: #050a05;
      --panel: #0d1a0d;
      --panel-2: #162616;
      --line: #2d4d2d;
      --text: #e0f2e0;
      --muted: #8fb38f;
      --accent: #22c55e; /* Зеленый акцент */
      --accent-2: #16a34a;
      --danger: #ef4444;
      --ok: #22c55e;
      --warn: #fbbf24;
      --shadow: 0 10px 30px rgba(0,0,0,.5);
      --radius: 12px;
    }
    body.light-theme {
      --bg: #f0fdf4;
      --panel: #ffffff;
      --panel-2: #f0fdf4;
      --line: #bbf7d0;
      --text: #064e3b;
      --muted: #475569;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--text);transition:0.3s}
    .container{max-width:1000px;margin:0 auto;padding:20px}
    .hidden{display:none !important}
    
    /* Навигация вкладок */
    .tabs { display:flex; gap:10px; margin-bottom:20px; }
    .tab-btn { padding:10px 20px; background:var(--panel); border:1px solid var(--line); color:var(--text); cursor:pointer; border-radius:var(--radius); }
    .tab-btn.active { background:var(--accent); color:#000; font-weight:bold; }
    
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:20px}
    select, input, button { padding:10px; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--text); }
    .btn-primary{background:var(--accent);color:#fff;border:none;cursor:pointer}
  </style>
</head>
<body>
  <div class="container">
    <div id="loginView" class="card">
      <h2>Вход</h2>
      <input id="accessCode" type="password" placeholder="Код доступа" />
      <button id="loginBtn" class="btn-primary">Войти</button>
    </div>

    <div id="appView" class="hidden">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('base')">База предметов</button>
        <button class="tab-btn" onclick="showTab('editor')">Редактор</button>
        <button class="tab-btn" onclick="showTab('calc')">Калькулятор</button>
        <button class="tab-btn" onclick="toggleTheme()">Тема</button>
      </div>

      <div id="tab-base" class="tab-content"><div class="card"><h2>База предметов</h2><div id="itemsList"></div></div></div>
      <div id="tab-editor" class="tab-content hidden"><div class="card"><h2>Редактор крафта</h2><div id="craftGrid"></div><select id="outputItem"></select><input id="outputQty" type="number" value="1" /><button id="saveRecipeBtn" class="btn-primary">Сохранить</button><div id="recipeCode" style="margin-top:10px; padding:10px; background:black; color:lime;"></div></div></div>
      <div id="tab-calc" class="tab-content hidden"><div class="card"><h2>Калькулятор</h2><select id="calcTarget"></select><input id="calcQty" type="number" value="1" /><button id="calcBtn" class="btn-primary">Посчитать</button><div id="calcResults"></div></div></div>
    </div>
  </div>

  <script>
    // 1. Логика вкладок
    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.remove('hidden');
      event.target.classList.add('active');
    }

    // 2. Светлая/Темная тема
    function toggleTheme() { document.body.classList.toggle('light-theme'); }

    // 3. Измененная генерация кода
    function getRecipeCodeFromData(outputItemId, outputQty, grid) {
      const item = state.items.find(x => x.id === outputItemId);
      const outputStr = item ? item.mtHand : 'null';
      const qtySuffix = (outputQty > 1) ? ` * ${outputQty}` : ''; // Добавлено условие
      const rows = [0,1,2].map(r => `[${[0,1,2].map(c => getItem(grid[r*3+c])?.mtHand || 'null').join(', ')}]`);
      return `recipes.addShaped(${outputStr}${qtySuffix}, [\n  ${rows.join(',\n  ')}\n]);`;
    }

    // Упрощенная логика доступа (только калькулятор для участника)
    function setRole(role) {
      state.role = role;
      if (role === 'viewer') {
        // Участнику показываем только вкладку Калькулятор
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
          if (idx !== 2) btn.classList.add('hidden');
        });
        showTab('calc');
      }
    }

    // Остальной JS код (логика работы с состояниями и рендером остается как в твоем исходнике)
    const state = { items: [], recipes: [], role: null };
    function getItem(id) { return state.items.find(x => x.id === id); }
    // ... остальная часть твоего скрипта ...
    
    // Инициализация
    document.getElementById('loginBtn').onclick = () => {
        const code = document.getElementById('accessCode').value;
        if (code === 'ADMIN123') setRole('admin');
        else if (code === 'VIEW123') setRole('viewer');
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
    };
  </script>
</body>
</html>
